replicaCount: 2

image:
  repository: nexus:8083/demo/flask-demo
  tag: staging-1
  pullPolicy: Always

imagePullSecrets:
  - name: nexus-registry-secret

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  host: flask-demo.staging.local
  annotations: {}

env:
  APP_ENV: "staging"
  FLASK_DEBUG: "0"
  GUNICORN_WORKERS: "3"

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: 350m
    memory: 384Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10