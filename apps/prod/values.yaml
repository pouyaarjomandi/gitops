replicaCount: 3

image:
  repository: nexus:8083/demo/flask-demo
  tag: main-8
  pullPolicy: Always
imagePullSecrets:
  - name: nexus-registry-secret
  
service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  host: flask-demo.prod.local
  annotations: {}

env:
  APP_ENV: "production"
  FLASK_DEBUG: "0"
  GUNICORN_WORKERS: "4"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10
