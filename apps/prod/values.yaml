replicaCount: 3

image:
  repository: nexus:8083/demo/flask-demo
  tag: v1.0.0
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  host: flask-demo.prod.local

env:
  FLASK_DEBUG: "0"
  GUNICORN_WORKERS: "4"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi