replicaCount: 1

image:
  repository: nexus:8083/demo/flask-demo
  tag: develop-1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  host: flask-demo.dev.local

env:
  FLASK_DEBUG: "1"
  GUNICORN_WORKERS: "2"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi