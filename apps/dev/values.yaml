replicaCount: 1

image:
  repository: nexus:8083/demo/flask-demo
  tag: develop-1
  pullPolicy: Always

imagePullSecrets:
  - name: nexus-registry-secret

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  host: flask-demo.dev.local
  annotations: {}

env:
  FLASK_DEBUG: "1"
  GUNICORN_WORKERS: "2"
  APP_ENV: "development"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10