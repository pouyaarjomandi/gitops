apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-demo-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/pouyaarjomandi/gitops.git
      targetRevision: main
      path: charts/flask-demo
      helm:
        valueFiles:
          - $values/apps/dev/values.yaml
    - repoURL: https://github.com/pouyaarjomandi/gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true