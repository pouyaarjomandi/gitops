apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-demo-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pouyaarjomandi/gitops.git
    targetRevision: main
    path: charts/flask-demo
    helm:
      valueFiles:
        - ../../apps/prod/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true